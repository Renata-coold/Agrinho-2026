<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Soja Sustentável - Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topo">
        <h1>Simulador Soja Sustentável</h1>
        <p>Agro Forte, Futuro Sustentável: equilibre produção, água e clima.</p>
    </header>

    <section class="painel">
        <div class="status-container">
            <div class="status-item">Dinheiro: <strong>R$ <span id="money">100</span></strong></div>
            <div class="status-item">Água do Solo: <strong><span id="water">100</span>%</strong></div>
            <div class="status-item">Produção: <strong><span id="score">0</span> sacas</strong></div>
            <div class="status-item">Clima: <strong><span id="weather">Ensolarado</span></strong></div>
        </div>
        <div class="controles">
            <button id="plantarBtn">🌱 Plantar Sementes</button>
            <button id="irrigarBtn">💧 Irrigar Solo (R$ 10)</button>
            <button id="colhedeiraBtn">🚜 Comprar Colhedeira (R$ 50)</button>
        </div>
        <div class="info-text">
            Use as setas para dirigir a colhedeira e passe por cima das plantas prontas para colher automaticamente.
        </div>
    </section>

    <canvas id="gameCanvas" width="700" height="420" aria-label="Simulador de plantio de soja"></canvas>
    <script src="script.js"></script>
</body>
</html>
